<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель - MA Furniture</title>
    <link rel="stylesheet" href="/admin/admin.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-header p {
            color: #666;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #fc8181;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            display: none;
            padding: 10px;
            background: #fed7d7;
            border-radius: 6px;
            border: 1px solid #fc8181;
        }

        .error-message.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #718096;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h2 {
            color: #4a5568;
            font-size: 24px;
            font-weight: 700;
        }

        .logo span {
            color: #667eea;
        }

        .login-info {
            background: #edf2f7;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 13px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h2>MA <span>Furniture</span></h2>
        </div>
        
        <div class="login-header">
            <h1>Админ-панель</h1>
            <p>Введите данные для входа</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Введите логин">
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required 
                       placeholder="Введите пароль">
            </div>
            
            <div class="error-message" id="errorMessage">
                Неверный логин или пароль
            </div>
            
            <div class="login-info">
                <strong>Демо доступ:</strong><br>
                Логин: <code>admin</code><br>
                Пароль: <code>admin123</code>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                Войти
            </button>
        </form>
        
        <div class="login-footer">
            © 2024 MA Furniture | Административная панель
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            // Сброс ошибок
            document.querySelectorAll('.form-group input').forEach(input => {
                input.classList.remove('error');
            });
            errorMessage.classList.remove('show');
            
            // Валидация
            if (!username || !password) {
                if (!username) {
                    document.getElementById('username').classList.add('error');
                }
                if (!password) {
                    document.getElementById('password').classList.add('error');
                }
                errorMessage.textContent = 'Заполните все поля';
                errorMessage.classList.add('show');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Вход...';
            
            try {
                console.log('Отправка запроса на /api/auth/login');
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include', // Важно для куки
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Ответ получен, статус:', response.status);
                
                const data = await response.json();
                console.log('Данные ответа:', data);
                
                if (response.ok && data.success) {
                    console.log('Вход успешен, перенаправление...');
                    window.location.href = '/admin/';
                } else {
                    errorMessage.textContent = data.error || 'Неверный логин или пароль';
                    errorMessage.classList.add('show');
                    
                    document.getElementById('username').classList.add('error');
                    document.getElementById('password').classList.add('error');
                    
                    console.error('Ошибка входа:', data.error);
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Ошибка соединения с сервером';
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
            }
        });
        
        // Фокус на поле логина при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
